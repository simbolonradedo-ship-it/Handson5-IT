<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { DEFAULT: '#f43f5e' } }
                }
            }
        }
    </script>
</head>
<body class="flex min-h-screen items-center justify-center bg-zinc-950 text-zinc-100">
    <div class="w-full max-w-md rounded-2xl border border-zinc-800/80 bg-zinc-900/50 px-8 py-8 text-center shadow-xl">
        <p class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">@Controller View Test</p>
        <h1 class="mt-4 text-2xl font-bold tracking-tight text-zinc-50" th:text="${message}">Message</h1>
        <p class="mt-3 text-sm text-zinc-500">
            Halaman ini dirender melalui template Thymeleaf, bukan teks langsung seperti
            endpoint dengan <span class="font-semibold text-zinc-300">@ResponseBody</span>.
        </p>
    </div>
</body>
</html>
