<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Kategori</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { DEFAULT: '#f43f5e' } }
                }
            }
        }
    </script>
</head>
<body class="flex min-h-screen flex-col bg-zinc-950 text-zinc-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1">
    <section class="mx-auto max-w-3xl px-4 py-10">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-zinc-50" th:text="${title}">Daftar Kategori</h1>
            <p class="mt-2 text-sm text-zinc-500">Lihat semua kategori yang tersedia beserta jumlah produknya.</p>
        </div>

        <ul class="mt-6 space-y-3">
            <li th:each="category : ${categories}"
                class="flex items-center justify-between rounded-2xl border border-zinc-800/80 bg-zinc-900/50 px-5 py-4 transition hover:border-rose-500/40 hover:bg-zinc-900/70">
                <div class="flex items-center gap-3">
                    <span class="h-2.5 w-2.5 rounded-full bg-rose-400"></span>
                    <a th:href="@{/products/category/{cat}(cat=${category})}" th:text="${category}"
                       class="font-semibold text-zinc-100 hover:text-rose-300">Kategori</a>
                </div>
                <span class="inline-flex items-center rounded-lg bg-rose-500/10 px-3 py-1.5 text-xs font-semibold text-rose-300">
                    <span th:text="${productService.countByCategory(category)}">0</span>
                    <span class="ml-1 text-zinc-500">produk</span>
                </span>
            </li>
        </ul>

        <div class="mt-8">
            <a th:href="@{/products}" class="inline-flex items-center gap-2 rounded-xl border border-zinc-700 bg-zinc-900/80 px-4 py-2.5 text-sm font-medium text-zinc-300 transition hover:border-rose-500/50 hover:bg-zinc-900 hover:text-rose-300">← Kembali ke Daftar Produk</a>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
