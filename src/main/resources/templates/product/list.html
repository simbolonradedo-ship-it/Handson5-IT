<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Daftar Produk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { DEFAULT: '#f43f5e' } }
                }
            }
        }
    </script>
</head>
<body class="flex min-h-screen flex-col bg-zinc-950 text-zinc-100">

<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="flex-1">
    <section class="mx-auto max-w-6xl px-4 py-10">
        <div class="flex flex-col gap-6 sm:flex-row sm:items-end sm:justify-between">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-zinc-50" th:text="${title}">Daftar Produk</h1>
                <p class="mt-2 text-sm text-zinc-500">Cari, filter berdasarkan kategori, dan lihat detail produk.</p>
            </div>
            <form th:action="@{/products/search}" method="get" class="w-full max-w-md sm:w-auto">
                <label class="flex items-center gap-2 rounded-xl border border-zinc-800 bg-zinc-900/70 px-4 py-2.5 focus-within:border-rose-500/50 focus-within:ring-1 focus-within:ring-rose-500/30">
                    <input type="text" name="keyword" placeholder="Nama produk..." th:value="${keyword}"
                           class="w-full bg-transparent text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none"/>
                    <button type="submit" class="rounded-lg bg-rose-500 px-4 py-2 text-sm font-semibold text-white transition hover:bg-rose-400">Cari</button>
                </label>
            </form>
        </div>

        <div class="mt-6 flex flex-wrap items-center gap-2">
            <span class="mr-2 text-xs text-zinc-500">Filter cepat:</span>
            <a th:href="@{/products}" class="rounded-lg border border-zinc-800 bg-zinc-900/70 px-3 py-2 text-xs font-medium text-zinc-300 transition hover:border-rose-500/50 hover:bg-zinc-900 hover:text-rose-300">Semua</a>
            <a th:href="@{/products/category/Elektronik}" class="rounded-lg border border-rose-500/40 bg-rose-500/10 px-3 py-2 text-xs font-medium text-rose-300 transition hover:border-rose-500/60 hover:bg-rose-500/20">Elektronik</a>
            <a th:href="@{/products/category/Buku}" class="rounded-lg border border-teal-500/40 bg-teal-500/10 px-3 py-2 text-xs font-medium text-teal-300 transition hover:border-teal-500/60 hover:bg-teal-500/20">Buku</a>
            <a th:href="@{/products/category/Makanan}" class="rounded-lg border border-amber-500/40 bg-amber-500/10 px-3 py-2 text-xs font-medium text-amber-300 transition hover:border-amber-500/60 hover:bg-amber-500/20">Makanan</a>
        </div>

        <p class="mt-4 text-sm text-zinc-500">
            Menampilkan <span class="font-semibold text-rose-300" th:text="${totalProducts}">0</span> produk
        </p>

        <div th:if="${!products.isEmpty()}" class="mt-6 overflow-hidden rounded-2xl border border-zinc-800/80 bg-zinc-900/50 shadow-xl">
            <table class="min-w-full divide-y divide-zinc-800/80 text-sm">
                <thead class="bg-zinc-950/80">
                    <tr>
                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500">No</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500">Nama Produk</th>
                        <th class="px-5 py-4 text-left text-xs font-semibold uppercase tracking-wider text-zinc-500">Kategori</th>
                        <th class="px-5 py-4 text-right text-xs font-semibold uppercase tracking-wider text-zinc-500">Harga</th>
                        <th class="px-5 py-4 text-center text-xs font-semibold uppercase tracking-wider text-zinc-500">Stok</th>
                        <th class="px-5 py-4 text-right text-xs font-semibold uppercase tracking-wider text-zinc-500">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-zinc-800/80">
                    <tr th:each="product, iterStat : ${products}" class="transition hover:bg-zinc-800/50">
                        <td class="whitespace-nowrap px-5 py-4 text-zinc-500" th:text="${iterStat.count}">1</td>
                        <td class="whitespace-nowrap px-5 py-4 font-medium text-zinc-100" th:text="${product.name}">Nama</td>
                        <td class="whitespace-nowrap px-5 py-4">
                            <a th:href="@{/products/category/{cat}(cat=${product.category})}" th:text="${product.category}"
                               class="rounded-lg bg-zinc-800/80 px-2.5 py-1 text-xs font-medium text-zinc-300 transition hover:bg-zinc-700">Kategori</a>
                        </td>
                        <td class="whitespace-nowrap px-5 py-4 text-right text-zinc-100"
                            th:text="'Rp ' + ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')}">Rp 0</td>
                        <td class="whitespace-nowrap px-5 py-4 text-center">
                            <span th:text="${product.stock}"
                                  th:classappend="${product.stock < 20} ? ' font-bold text-red-400' : ' text-teal-400'">0</span>
                        </td>
                        <td class="whitespace-nowrap px-5 py-4 text-right">
                            <a th:href="@{/products/{id}(id=${product.id})}"
                               class="inline-flex items-center rounded-lg border border-rose-500/50 bg-rose-500/10 px-3 py-2 text-xs font-semibold text-rose-300 transition hover:bg-rose-500/20">Detail</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${products.isEmpty()}" class="mt-6 rounded-2xl border border-amber-500/40 bg-amber-500/10 px-6 py-5 text-sm text-amber-200">
            Tidak ada produk yang ditemukan.
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
