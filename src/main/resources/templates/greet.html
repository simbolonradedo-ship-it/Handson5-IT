<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Greeting</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: { DEFAULT: '#f43f5e' } }
                }
            }
        }
    </script>
</head>
<body class="flex min-h-screen flex-col bg-zinc-950 text-zinc-100">
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="flex flex-1 items-center justify-center px-4 py-12">
    <div class="w-full max-w-md rounded-2xl border border-zinc-800/80 bg-zinc-900/50 px-8 py-8 text-center shadow-xl">
        <p class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Greeting Demo</p>
        <h1 class="mt-4 text-2xl font-bold tracking-tight text-zinc-50" th:text="${greeting}">Greeting</h1>
        <p class="mt-3 text-sm text-zinc-500">
            Nilai ini berasal dari parameter URL menggunakan
            <span class="font-semibold text-zinc-300">@RequestParam</span>
            dan <span class="font-semibold text-zinc-300">@PathVariable</span>.
        </p>
        <div class="mt-6">
            <a th:href="@{/}" class="inline-flex items-center gap-2 rounded-xl border border-zinc-700 bg-zinc-900/80 px-4 py-2.5 text-sm font-medium text-zinc-300 transition hover:border-rose-500/50 hover:bg-zinc-900 hover:text-rose-300">← Kembali ke Beranda</a>
        </div>
    </div>
</div>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
